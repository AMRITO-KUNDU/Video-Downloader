services:
  - type: web
    name: vidgrab
    runtime: python
    pythonVersion: "3.12"
    buildCommand: bash render-build.sh
    startCommand: >-
      gunicorn
      --worker-class sync
      --workers 1
      --threads 4
      --bind 0.0.0.0:$PORT
      --timeout 120
      --keep-alive 75
      --max-requests 200
      --max-requests-jitter 20
      --chdir backend
      app:app
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: STATIC_DIR
        value: /opt/render/project/src/backend/static
