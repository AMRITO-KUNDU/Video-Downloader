services:
  - type: web
    name: vidgrab
    runtime: python
    pythonVersion: "3.12"
    buildCommand: bash render-build.sh
    startCommand: >-
      gunicorn
      --worker-class gevent
      --workers 2
      --worker-connections 100
      --bind 0.0.0.0:$PORT
      --timeout 3600
      --keep-alive 5
      --chdir backend
      app:app
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: STATIC_DIR
        value: /opt/render/project/src/backend/static
